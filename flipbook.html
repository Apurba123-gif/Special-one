<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rhythymic ✨</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
to bottom,
#120008,
#2b0f18
);

overflow:hidden;

font-family:sans-serif;

}

/* CLOSE BUTTON */

.close-btn{

position:fixed;

top:20px;
left:20px;

width:50px;
height:50px;

border:none;
border-radius:50%;

background:
rgba(255,255,255,.25);

backdrop-filter:blur(12px);

color:#fff;

font-size:28px;
font-weight:bold;

display:flex;
justify-content:center;
align-items:center;

cursor:pointer;

z-index:99999;

box-shadow:
0 0 20px rgba(255,255,255,.2);

}

/* PREV BUTTON */

.prev-btn{

position:fixed;

left:15px;
top:50%;

transform:translateY(-50%);

width:45px;
height:45px;

border:none;
border-radius:50%;

background:
rgba(255,255,255,.18);

backdrop-filter:blur(10px);

color:white;

font-size:24px;

cursor:pointer;

z-index:1000;

}

/* NEXT BUTTON */

.next-btn{

position:fixed;

right:15px;
top:50%;

transform:translateY(-50%);

width:45px;
height:45px;

border:none;
border-radius:50%;

background:
rgba(255,255,255,.18);

backdrop-filter:blur(10px);

color:white;

font-size:24px;

cursor:pointer;

z-index:1000;

}

/* FLIPBOOK */

#flipbook{

width:90vw;
height:90vh;

}

/* PAGE */

#flipbook .page{

background:
linear-gradient(
to bottom,
#f5e6cc,
#e8d3b3
);

overflow:hidden;

border-radius:12px;

box-shadow:
0 0 25px rgba(0,0,0,.25);

}

/* IMAGE */

#flipbook img{

width:100%;
height:100%;

object-fit:contain;

display:block;

border-radius:12px;

}

/* MOBILE */

@media(max-width:768px){

#flipbook{

width:95vw;
height:85vh;

}

.prev-btn,
.next-btn{

width:40px;
height:40px;

font-size:20px;

}

.close-btn{

width:45px;
height:45px;

font-size:24px;

}

}

</style>

</head>

<body>

<!-- CLOSE -->

<button class="close-btn"
onclick="window.location.href='surprise.html'">

✕

</button>

<!-- PREVIOUS -->

<button class="prev-btn"
onclick="$('#flipbook').turn('previous')">

❮

</button>

<!-- NEXT -->

<button class="next-btn"
onclick="$('#flipbook').turn('next')">

❯

</button>

<!-- BOOK -->

<div id="flipbook">

<div class="page">
<img src="assets/page1.png">
</div>

<div class="page">
<img src="assets/page2.png">
</div>

<div class="page">
<img src="assets/page3.png">
</div>

<div class="page">
<img src="assets/page4.png">
</div>

<div class="page">
<img src="assets/page5.png">
</div>

<div class="page">
<img src="assets/page6.png">
</div>

<div class="page">
<img src="assets/page7.png">
</div>

<div class="page">
<img src="assets/page8.png">
</div>

<div class="page">
<img src="assets/page9.png">
</div>

<div class="page">
<img src="assets/page10.png">
</div>

</div>

<script>

$("#flipbook").turn({

width:window.innerWidth > 768
? 1000
: window.innerWidth * 0.95,

height:window.innerWidth > 768
? 700
: window.innerHeight * 0.85,

autoCenter:true,

display:"single",

acceleration:true,

gradients:true,

elevation:50

});

</script>

</body>
</html>
